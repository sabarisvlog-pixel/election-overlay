<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Election Live Results</title>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
    font-family:Arial, sans-serif;
}

.container{
    width:100%;
    height:100px;
    display:flex;
    justify-content:space-around;
    align-items:center;
    overflow:hidden;
    background:transparent;
}

.box{
    flex:1;
    text-align:center;
    padding:8px;
    border-right:1px solid rgba(255,255,255,0.2);
    background:rgba(0,0,0,0.5);
}

.box:last-child{
    border-right:none;
}

.party{
    color:white;
    font-size:20px;
    font-weight:bold;
    margin-bottom:6px;
}

.votes{
    color:yellow;
    font-size:32px;
    font-weight:bold;
    transition: all 0.4s ease;
}

/* Animation effect */
.animate{
    animation: pulse 0.6s ease;
}

@keyframes pulse{

    0%{
        transform:scale(1);
        color:yellow;
    }

    50%{
        transform:scale(1.25);
        color:#00ff99;
        text-shadow:0 0 20px #00ff99;
    }

    100%{
        transform:scale(1);
        color:yellow;
    }
}
.leads{
    color:#00ff99;
    font-size:14px;
    margin-top:4px;
}

</style>
</head>

<body>

<div class="container" id="results"></div>

<script>

const apiURL =
"https://opensheet.elk.sh/13QqLZvgBpr6NY1RWcpnYXiKlOX6Yz-Ln2t-HjNoUE70/Sheet1";

// Store previous values
let previousVotes = {};

async function loadData(){

    try{

        const response = await fetch(apiURL);

        const data = await response.json();

        let html = "";

        data.forEach(row => {

            const party = (row.Party || "").trim();
            const votes = (row.Votes || "0").trim();
            const leads = (row.Leads || "0").trim();

            // Detect change
            const changed = previousVotes[party] !== votes;

            previousVotes[party] = votes;

            html += `
                <div class="box">

                    <div class="party">
                        ${party}
                    </div>

                    <div class="votes ${changed ? 'animate' : ''}">
                        ${votes}
                    </div>

                    <div class="leads">
                        Leads: ${leads}
                    </div>

                </div>
            `;
        });

        document.getElementById("results").innerHTML = html;

    }catch(error){

        console.log(error);

    }
}

loadData();

setInterval(loadData, 3000);

</script>

</body>
</html>
