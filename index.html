<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamil Nadu Election 2026</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#04142b;
    font-family:Arial,sans-serif;
    color:white;
}

/* HEADER */

.header{
    width:100%;
    height:70px;
    background:#07101d;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    border-bottom:2px solid #0f2f57;
}

.live{
    background:red;
    padding:10px 18px;
    border-radius:6px;
    font-size:20px;
    font-weight:bold;
}

.title{
    font-size:36px;
    font-weight:bold;
}

.yellow{
    color:#ffd400;
}

.clock{
    font-size:24px;
    font-weight:bold;
}

/* BREAKING NEWS */

.breaking{
    width:100%;
    height:42px;
    background:white;
    display:flex;
    align-items:center;
    overflow:hidden;
    position:relative;
}

.breaking-left{
    width:170px;
    height:100%;
    background:red;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:bold;
    z-index:5;
}

.marquee{
    position:absolute;
    left:190px;
    white-space:nowrap;
    color:black;
    font-size:18px;
    font-weight:bold;
    animation:scroll 20s linear infinite;
}

@keyframes scroll{

    0%{
        transform:translateX(100%);
    }

    100%{
        transform:translateX(-100%);
    }
}

/* MAIN */

.main{
    width:100%;
    height:calc(100% - 232px);
    display:flex;
}

/* LEFT PANEL */

.left-panel{
    width:220px;
    padding:10px;
}

.card{
    background:#082041;
    border:2px solid #113b68;
    border-radius:10px;
    margin-bottom:14px;
    padding:18px;
    text-align:center;
}

.card-title{
    font-size:18px;
    margin-bottom:10px;
}

.card-value{
    font-size:42px;
    color:#ffe600;
    font-weight:bold;
}

/* CENTER */

.center{
    flex:1;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
}

.map-title{
    position:absolute;
    top:15px;
    left:20px;
    font-size:34px;
    font-weight:bold;
}

.map-title span{
    color:#ffd400;
}

.tn-map{
    width:550px;
    max-width:90%;
    object-fit:contain;
}

/* RIGHT PANEL */

.right-panel{
    width:300px;
    padding:10px;
}

.updates{
    width:100%;
    height:100%;
    background:#082041;
    border:2px solid #113b68;
    border-radius:10px;
    padding:15px;
    overflow:hidden;
}

.update-title{
    background:red;
    padding:12px;
    border-radius:6px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
    margin-bottom:20px;
}

#updatesContainer{
    overflow-y:auto;
    height:calc(100% - 80px);
}

.update-item{
    margin-bottom:20px;
    line-height:1.5;
    font-size:18px;
}

.time{
    color:#ffd400;
    font-weight:bold;
}

/* BOTTOM BAR */

.container{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:120px;
    background:rgba(0,0,0,0.95);
    display:flex;
    align-items:center;
    justify-content:space-around;
}

.box{
    flex:1;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border-right:1px solid rgba(255,255,255,0.15);
}

.box:last-child{
    border-right:none;
}

.logo{
    width:30px;
    height:30px;
    object-fit:contain;
    margin-bottom:4px;
}

.party{
    font-size:13px;
    font-weight:bold;
}

.votes{
    font-size:28px;
    font-weight:bold;
    color:yellow;
}

.leads{
    font-size:11px;
    color:#00ff99;
}

/* ANIMATION */

.animate{
    animation:pulse 0.6s ease;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.2);
    }

    100%{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<!-- AUDIO -->

<audio id="bgMusic" loop>
    <source src="news.mp3" type="audio/mpeg">
</audio>

<!-- HEADER -->

<div class="header">

    <div class="live">
        LIVE
    </div>

    <div class="title">
        TAMIL NADU <span class="yellow">ELECTION 2026</span>
    </div>

    <div class="clock" id="clock">
        10:00 PM
    </div>

</div>

<!-- BREAKING NEWS -->

<div class="breaking">

    <div class="breaking-left">
        BREAKING NEWS
    </div>

    <div class="marquee" id="liveNews">
        Loading updates...
    </div>

</div>

<!-- MAIN -->

<div class="main">

    <!-- LEFT -->

    <div class="left-panel">

        <div class="card">
            <div class="card-title">
                TOTAL SEATS
            </div>

            <div class="card-value" id="totalSeats">
                234
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                LEADING
            </div>

            <div class="card-value" id="leadingSeats">
                0
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                COUNTED
            </div>

            <div class="card-value" id="countedSeats">
                0
            </div>
        </div>

    </div>

    <!-- CENTER -->

    <div class="center">

        <div class="map-title">
            TAMIL NADU <span>LIVE MAP</span>
        </div>

        <img class="tn-map"
        src="tnmap.png">

    </div>

    <!-- RIGHT -->

    <div class="right-panel">

        <div class="updates">

            <div class="update-title">
                KEY UPDATES
            </div>

            <div id="updatesContainer">
                Loading updates...
            </div>

        </div>

    </div>

</div>

<!-- BOTTOM PARTY BAR -->

<div class="container" id="results"></div>

<script>

/* MUSIC */

const music = document.getElementById("bgMusic");

music.volume = 0.5;

function startMusic(){

    music.play();

    document.removeEventListener("click", startMusic);
}

document.addEventListener("click", startMusic);

/* CLOCK */

function updateClock(){

    const now = new Date();

    let hours = now.getHours();

    let minutes = now.getMinutes();

    let ampm = hours >= 12 ? 'PM' : 'AM';

    hours = hours % 12;

    hours = hours ? hours : 12;

    minutes = minutes < 10 ? '0'+minutes : minutes;

    document.getElementById("clock").innerHTML =
    `${hours}:${minutes} ${ampm}`;
}

setInterval(updateClock,1000);

updateClock();

/* GOOGLE SHEETS */

const apiURL =
"https://opensheet.elk.sh/13QqLZvgBpr6NY1RWcpnYXiKlOX6Yz-Ln2t-HjNoUE70/Sheet1";

const newsAPI =
"https://opensheet.elk.sh/13QqLZvgBpr6NY1RWcpnYXiKlOX6Yz-Ln2t-HjNoUE70/News";

const updatesAPI =
"https://opensheet.elk.sh/13QqLZvgBpr6NY1RWcpnYXiKlOX6Yz-Ln2t-HjNoUE70/Updates";

const statsAPI =
"https://opensheet.elk.sh/13QqLZvgBpr6NY1RWcpnYXiKlOX6Yz-Ln2t-HjNoUE70/Stats";

/* LOGOS */

const logos = {

"DMK":"dmk.png",

"AIADMK":"aiadmk.png",

"BJP":"bjp.png",

"INC":"inc.png",

"NTK":"ntk.png",

"TVK":"tvk.png"
};

let previousVotes = {};

/* PARTY DATA */

async function loadData(){

    const response = await fetch(apiURL);

    const data = await response.json();

    let html = "";

    data.forEach(row => {

        const party = row.Party || "";

        const votes = row.Votes || "0";

        const leads = row.Leads || "0";

        const changed = previousVotes[party] !== votes;

        previousVotes[party] = votes;

        html += `

        <div class="box">

            <img class="logo"
            src="${logos[party]}">

            <div class="party">
                ${party}
            </div>

            <div class="votes ${changed ? 'animate' : ''}">
                ${votes}
            </div>

            <div class="leads">
                Leads: ${leads}
            </div>

        </div>
        `;
    });

    document.getElementById("results").innerHTML = html;
}

/* BREAKING NEWS */

async function loadNews(){

    const response = await fetch(newsAPI);

    const data = await response.json();

    let text = "";

    data.forEach(row => {

        text += row.News + " | ";
    });

    document.getElementById("liveNews").innerHTML = text;
}

/* KEY UPDATES */

async function loadUpdates(){

    const response = await fetch(updatesAPI);

    const data = await response.json();

    let html = "";

    data.forEach(row => {

        html += `

        <div class="update-item">

            <span class="time">
                ${row.Time}
            </span>

            <br>

            ${row.Update}

        </div>
        `;
    });

    document.getElementById("updatesContainer").innerHTML = html;
}

/* STATS */

async function loadStats(){

    const response = await fetch(statsAPI);

    const data = await response.json();

    document.getElementById("totalSeats").innerHTML =
    data[0].Total;

    document.getElementById("leadingSeats").innerHTML =
    data[0].Leading;

    document.getElementById("countedSeats").innerHTML =
    data[0].Counted;
}

/* LOAD */

loadData();
loadNews();
loadUpdates();
loadStats();

/* AUTO REFRESH */

setInterval(()=>{

    loadData();
    loadNews();
    loadUpdates();
    loadStats();

},3000);

</script>

</body>
</html>
