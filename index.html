<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Live Overlay</title>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
    font-family:Arial, sans-serif;
}

/* MAIN CONTAINER */
.container{
    width:100%;
    height:140px;
    display:flex;
    justify-content:space-around;
    align-items:center;
    overflow:hidden;
    background:transparent;
}

/* EACH PARTY BOX */
.box{
    flex:1;
    text-align:center;
    padding:6px;
    border-right:1px solid rgba(255,255,255,0.2);
    background:rgba(0,0,0,0.5);

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* PARTY LOGO */
.logo{
    width:30px;
    height:30px;
    object-fit:contain;
    margin-bottom:2px;
}

/* PARTY NAME */
.party{
    color:white;
    font-size:14px;
    font-weight:bold;
}

/* VOTE COUNT */
.votes{
    color:yellow;
    font-size:22px;
    font-weight:bold;
    margin-top:2px;
}

/* LEADS */
.leads{
    color:#00ff99;
    font-size:11px;
    margin-top:2px;
}

/* ANIMATION */
.animate{
    animation:pulse 0.6s ease;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.25);
        color:#00ff99;
        text-shadow:0 0 20px #00ff99;
    }

    100%{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<div class="container" id="results"></div>

<script>

// GOOGLE SHEET API
const apiURL =
"https://opensheet.elk.sh/13QqLZvgBpr6NY1RWcpnYXiKlOX6Yz-Ln2t-HjNoUE70/Sheet1";

// PARTY LOGOS
const logos = {

    "DMK":
    "https://sabarisvlog-pixel.github.io/election-overlay/dmk.png",

    "AIADMK":
    "https://sabarisvlog-pixel.github.io/election-overlay/aiadmk.png",

    "BJP":
    "https://sabarisvlog-pixel.github.io/election-overlay/bjp.png",

    "INC":
    "https://sabarisvlog-pixel.github.io/election-overlay/inc.png",

    "NTK":
    "https://sabarisvlog-pixel.github.io/election-overlay/ntk.png",

    "TVK":
    "https://sabarisvlog-pixel.github.io/election-overlay/tvk.png"
};

// STORE OLD VALUES
let previousVotes = {};

async function loadData(){

    try{

        const response = await fetch(apiURL);

        const data = await response.json();

        let html = "";

        data.forEach(row => {

            const party = (row.Party || "").trim();

            const votes = (row.Votes || "0").trim();

            const leads = (row.Leads || "0").trim();

            const changed = previousVotes[party] !== votes;

            previousVotes[party] = votes;

            html += `

                <div class="box">

                    <img class="logo"
                    src="${logos[party]}"
                    alt="${party}">

                    <div class="party">
                        ${party}
                    </div>

                    <div class="votes ${changed ? 'animate' : ''}">
                        ${votes}
                    </div>

                    <div class="leads">
                        Leads: ${leads}
                    </div>

                </div>
            `;
        });

        document.getElementById("results").innerHTML = html;

    }catch(error){

        console.log(error);
    }
}

// FIRST LOAD
loadData();

// AUTO REFRESH
setInterval(loadData, 3000);

</script>

</body>
</html>
