<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tamil Nadu Election 2026</title>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#06152d;
    font-family:Arial, sans-serif;
    color:white;
}

/* =========================
TOP HEADER
========================= */

.header{

    height:70px;

    background:#08111f;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 25px;

    border-bottom:2px solid #12345c;

    box-sizing:border-box;
}

/* LIVE BADGE */

.live{

    background:red;

    padding:8px 18px;

    border-radius:6px;

    font-size:24px;

    font-weight:bold;
}

/* TITLE */

.title{

    font-size:42px;

    font-weight:bold;
}

.yellow{
    color:#ffd400;
}

/* CLOCK */

.clock{

    font-size:28px;

    font-weight:bold;
}

/* =========================
BREAKING NEWS
========================= */

.breaking{

    height:50px;

    background:white;

    display:flex;

    align-items:center;

    overflow:hidden;
}

.breaking-left{

    background:red;

    color:white;

    padding:12px 20px;

    font-size:22px;

    font-weight:bold;
}

.marquee{

    color:black;

    font-size:22px;

    font-weight:bold;

    white-space:nowrap;

    padding-left:20px;

    animation:scroll 15s linear infinite;
}

@keyframes scroll{

    0%{
        transform:translateX(100%);
    }

    100%{
        transform:translateX(-100%);
    }
}

/* =========================
MAIN CONTENT
========================= */

.main{

    display:flex;

    width:100%;

    height:calc(100% - 240px);
}

/* =========================
LEFT PANEL
========================= */

.left-panel{

    width:260px;

    padding:15px;

    box-sizing:border-box;
}

.card{

    background:#0b1d35;

    border:2px solid #12345c;

    border-radius:10px;

    margin-bottom:15px;

    padding:18px;

    text-align:center;
}

.card-title{

    font-size:20px;

    margin-bottom:10px;
}

.card-value{

    font-size:42px;

    color:#ffd400;

    font-weight:bold;
}

/* =========================
CENTER MAP
========================= */

.center{

    flex:1;

    position:relative;

    display:flex;

    justify-content:center;

    align-items:center;
}

.map-title{

    position:absolute;

    top:20px;

    left:20px;

    font-size:40px;

    font-weight:bold;
}

.map-title span{

    color:#ffd400;
}

.center img{

    width:500px;

    opacity:0.9;
}

/* =========================
RIGHT PANEL
========================= */

.right-panel{

    width:320px;

    padding:15px;

    box-sizing:border-box;
}

.updates{

    background:#0b1d35;

    border:2px solid #12345c;

    border-radius:10px;

    height:100%;

    padding:20px;

    box-sizing:border-box;
}

.update-title{

    background:red;

    padding:10px;

    border-radius:6px;

    text-align:center;

    font-size:24px;

    font-weight:bold;

    margin-bottom:20px;
}

.update-item{

    margin-bottom:25px;

    font-size:20px;

    line-height:1.5;
}

.time{

    color:#ffd400;

    font-weight:bold;
}

/* =========================
BOTTOM LIVE TICKER
========================= */

.container{

    position:fixed;

    bottom:0;

    left:0;

    width:100%;

    height:120px;

    display:flex;

    justify-content:space-around;

    align-items:center;

    background:rgba(10,10,10,0.95);

    overflow:hidden;

    padding-bottom:10px;

    box-sizing:border-box;
}

/* PARTY BOX */

.box{

    flex:1;

    height:100%;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    border-right:1px solid rgba(255,255,255,0.15);
}

.box:last-child{
    border-right:none;
}

/* PARTY LOGO */

.logo{

    width:26px;

    height:26px;

    object-fit:contain;

    margin-bottom:2px;
}

/* PARTY NAME */

.party{

    color:white;

    font-size:12px;

    font-weight:bold;
}

/* VOTES */

.votes{

    color:yellow;

    font-size:22px;

    font-weight:bold;

    margin-top:2px;
}

/* LEADS */

.leads{

    color:#00ff99;

    font-size:9px;

    margin-top:1px;
}

/* ANIMATION */

.animate{
    animation:pulse 0.6s ease;
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.2);
        color:#00ff99;
        text-shadow:0 0 12px #00ff99;
    }

    100%{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<!-- TOP HEADER -->

<div class="header">

    <div class="live">
        LIVE
    </div>

    <div class="title">
        TAMIL NADU <span class="yellow">ELECTION 2026</span>
    </div>

    <div class="clock" id="clock">
        11:45 AM
    </div>

</div>

<!-- BREAKING NEWS -->

<div class="breaking">

    <div class="breaking-left">
        BREAKING NEWS
    </div>

    <div class="marquee" id="liveNews">
Loading updates...
</div>

</div>

<!-- MAIN CONTENT -->

<div class="main">

    <!-- LEFT PANEL -->

    <div class="left-panel">

        <div class="card">
            <div class="card-title">TOTAL SEATS</div>
            <div class="card-value">234</div>
        </div>

        <div class="card">
            <div class="card-title">LEADING</div>
            <div class="card-value">146</div>
        </div>

        <div class="card">
            <div class="card-title">COUNTED</div>
            <div class="card-value">234</div>
        </div>

    </div>

    <!-- CENTER -->

    <div class="center">

        <div class="map-title">
            TAMIL NADU <span>LIVE MAP</span>
        </div>

        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Tamil_Nadu_locator_map.svg/800px-Tamil_Nadu_locator_map.svg.png">

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

        <div class="updates">

    <div class="update-title">
        KEY UPDATES
    </div>

    <div id="updatesContainer">

        Loading updates...

    </div>

</div>

        </div>

    </div>

</div>

<!-- LIVE TICKER -->

<div class="container" id="results"></div>

<script>

// LIVE CLOCK

function updateClock(){

    const now = new Date();

    let hours = now.getHours();

    let minutes = now.getMinutes();

    let ampm = hours >= 12 ? 'PM' : 'AM';

    hours = hours % 12;

    hours = hours ? hours : 12;

    minutes = minutes < 10 ? '0'+minutes : minutes;

    document.getElementById("clock").innerHTML =
    `${hours}:${minutes} ${ampm}`;
}

setInterval(updateClock, 1000);

updateClock();

// GOOGLE SHEET API

const apiURL =
"https://opensheet.elk.sh/13QqLZvgBpr6NY1RWcpnYXiKlOX6Yz-Ln2t-HjNoUE70/Sheet1";

// PARTY LOGOS

const logos = {

    "DMK":
    "https://sabarisvlog-pixel.github.io/election-overlay/dmk.png",

    "AIADMK":
    "https://sabarisvlog-pixel.github.io/election-overlay/aiadmk.png",

    "BJP":
    "https://sabarisvlog-pixel.github.io/election-overlay/bjp.png",

    "INC":
    "https://sabarisvlog-pixel.github.io/election-overlay/inc.png",

    "NTK":
    "https://sabarisvlog-pixel.github.io/election-overlay/ntk.png",

    "TVK":
    "https://sabarisvlog-pixel.github.io/election-overlay/tvk.png"
};
const updatesAPI =
"https://opensheet.elk.sh/13QqLZvgBpr6NY1RWcpnYXiKlOX6Yz-Ln2t-HjNoUE70/Updates";
    
let previousVotes = {};

async function loadData(){

    try{

        const response = await fetch(apiURL);

        const data = await response.json();

        let html = "";

        data.forEach(row => {

            const party = (row.Party || "").trim();

            const votes = (row.Votes || "0").trim();

            const leads = (row.Leads || "0").trim();

            const changed = previousVotes[party] !== votes;

            previousVotes[party] = votes;

            html += `

                <div class="box">

                    <img class="logo"
                    src="${logos[party]}"
                    alt="${party}">

                    <div class="party">
                        ${party}
                    </div>

                    <div class="votes ${changed ? 'animate' : ''}">
                        ${votes}
                    </div>

                    <div class="leads">
                        Leads: ${leads}
                    </div>

                </div>
            `;
        });

        document.getElementById("results").innerHTML = html;

    }catch(error){

        console.log(error);
    }
}
// NEWS API
const newsAPI =
"https://opensheet.elk.sh/13QqLZvgBpr6NY1RWcpnYXiKlOX6Yz-Ln2t-HjNoUE70/News";

// LOAD NEWS
async function loadUpdates(){

    try{

        const response = await fetch(updatesAPI);

        const data = await response.json();

        let html = "";

        data.forEach(row => {

            html += `

                <div class="update-item">

                    <span class="time">
                        ${row.Time}
                    </span>

                    <br>

                    ${row.Update}

                </div>

            `;
        });

        document.getElementById("updatesContainer").innerHTML = html;

    }catch(error){

        console.log(error);
    }
}
loadData();
loadNews();
loadUpdates();

setInterval(() => {

    loadData();
loadNews();
loadUpdates();

}, 3000);

</script>

</body>
</html>
